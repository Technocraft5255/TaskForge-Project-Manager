<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskForge</title>
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v6.0.0-beta1/css/all.css">
    </link>
    <link rel="stylesheet" href="styles/login.css">
    
</head>

<body>
    <!-- <input type="text" id="project_name_input" placeholder="Enter project name">
    <button id="create_project_btn", onclick="createProject()">Create New Project</button>

    <div id="project_list"></div> -->
    <div class="login_background"></div>
    <div id="login_form" class="login_form">
        <h1>Welcome Back</h1>
        <p>Email</p>
        <label class="input_container" for="email_input" id="email_input_container">
            <i class="fa-regular fa-envelope"></i>
            <input type="text" id="email_input" placeholder="company.name">

        </label>

        <p>Password</p>
        <label class="input_container" for="password_input" id="password_input_container">
            <i class="fa-regular fa-lock"></i>
            <input type="password" id="password_input" placeholder="••••••••">
        </label>
        <div class="options">
            <div>
                <input type="checkbox" id="remember_me_checkbox">
                <label for="remember_me_checkbox">Remember me</label>
            </div>
            <a href="./forgot-password">Forgot password?</a>
        </div>
        <button id="login_button" >Login <i class="fa-regular fa-arrow-right"></i></button>
    </div>
    <script src="login.js"></script>
</body>

</html>
